<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>human-web</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: transparent;
    }
    nav .logo { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.02em; }
    nav .links { display: flex; gap: 1.5rem; }
    nav a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    nav a:hover { color: #fff; }

    /* Hero — this is where the characters walk */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      position: relative;
    }
    .hero h1 {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }
    .hero .tagline {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      opacity: 0.8;
      max-width: 500px;
      margin-bottom: 2rem;
    }
    .hero .version {
      font-size: 0.75rem;
      opacity: 0.5;
      margin-top: 0.5rem;
    }

    /* Install box */
    .install {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      padding: 0.8rem 1.2rem;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: clamp(0.65rem, 1.5vw, 0.85rem);
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
      max-width: 90vw;
      word-break: break-all;
      padding-right: 2.5rem;
    }
    .install:hover { background: rgba(0, 0, 0, 0.45); }
    .install .copy-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      opacity: 0.5;
      transition: opacity 0.2s;
      line-height: 0;
    }
    .install:hover .copy-btn { opacity: 0.8; }

    /* Buttons */
    .actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      padding: 0.6rem 1.4rem;
      border-radius: 8px;
      border: none;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.1s, background 0.2s;
      text-decoration: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: #fff;
      color: #1a1a2e;
    }
    .btn-primary:hover { background: #e8e8f0; }
    .btn-ghost {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.25); }

    /* Demo controls */
    .demo-controls {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 0.4rem;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      padding: 0.5rem 0.8rem;
      border-radius: 12px;
    }
    .demo-controls button {
      padding: 0.35rem 0.7rem;
      border: 1px solid rgba(255,255,255,0.2);
      background: none;
      color: rgba(255,255,255,0.7);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.7rem;
      transition: all 0.15s;
    }
    .demo-controls button:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.75rem;
      opacity: 0.4;
      background: transparent;
    }
    footer a { color: inherit; }
  </style>
</head>
<body>

  <nav>
    <div class="logo">human-web</div>
    <div class="links">
      <a href="https://github.com/ShotaNagafuchi/human-web">GitHub</a>
      <a href="https://www.npmjs.com/package/human-web">npm</a>
    </div>
  </nav>

  <div class="hero">
    <h1>human-web</h1>
    <p class="tagline">A lightweight JavaScript library for adding walking 3D characters to any website</p>
    <div class="install" onclick="copy(this)">
      <code>&lt;script src="https://unpkg.com/human-web"&gt;&lt;/script&gt;</code>
      <button class="copy-btn" aria-label="Copy"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button>
    </div>
    <div class="actions">
      <a class="btn btn-primary" href="https://github.com/ShotaNagafuchi/human-web">GitHub</a>
      <a class="btn btn-ghost" href="https://github.com/ShotaNagafuchi/human-web/archive/refs/heads/main.zip">Download</a>
    </div>
    <div class="version">v0.1.0</div>
  </div>

  <footer>
    MIT &mdash; <a href="https://github.com/ShotaNagafuchi/human-web">ShotaNagafuchi/human-web</a>
  </footer>

  <div class="demo-controls">
    <button onclick="HumanWeb.triggerAll('wander')">Walk</button>
    <button onclick="HumanWeb.triggerAll('run')">Run</button>
    <button onclick="HumanWeb.triggerAll('idle')">Idle</button>
    <button onclick="HumanWeb.triggerAll('sit')">Sit</button>
    <button onclick="HumanWeb.triggerAll('chameleon')">Camo</button>
    <button onclick="HumanWeb.addCharacter()">+</button>
    <button onclick="HumanWeb.removeCharacter()">-</button>
  </div>

  <script>
    function copy(el) {
      const text = el.querySelector('code').textContent;
      navigator.clipboard.writeText(text);
      const btn = el.querySelector('.copy-btn');
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4f4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      setTimeout(() => {
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
      }, 2000);
    }
  </script>
  <script src="../dist/human-web.js"></script>
</body>
</html>
